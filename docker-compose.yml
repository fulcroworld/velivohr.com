services:
  backend:
    container_name: "velivo-hr-backend"
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5007:5000"
    env_file:
      - .env
    restart: always

  frontend:
    container_name: "velivo-hr-frontend"
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3017:5173"
    env_file:
      - .env
    depends_on:
      - backend
    restart: always
