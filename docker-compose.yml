services:
  backend:
    container_name: "velivo-hr-backend"
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5007:5000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    container_name: "velivo-hr-frontend"
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3017:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: always

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.99.1.0/24
